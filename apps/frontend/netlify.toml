[build]
  base = "apps/frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "false"
  NODE_VERSION = "22"
  NPM_FLAGS = "--prefix=apps/frontend"
  NEXT_PRIVATE_STANDALONE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
  [plugins.inputs]
    version = "5.9.0"